spring:
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: manual
  config:
    import: classpath:application-ai.yml
  threads:
    virtual:
      enabled: true
  application:
    name: person-blog
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /doc.html

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: "true"
      logic-not-delete-value: "false"
jwt:
  secret: ${JWT_SECRET:}
  expiration: 1800000
  refresh-token-expiration: 604800000
aliyun:
  oss:
    # 引用系统变量中的 AccessKeyId，若不存在则用空字符串（避免启动报错）
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    # 引用系统变量中的 AccessKeySecret
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    # OSS 地域节点（如杭州：oss-cn-hangzhou.aliyuncs.com）
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    # OSS 桶名称
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:person-blog-lsh}
logging:
  level:
    root: info
    com.lishuaihao.personblog: info
