spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:person_blog}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      keepalive-time: 30000
      max-lifetime: 1800000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:2}
      timeout: 60000
      lettuce:
        pool:
          max-active: 32
          max-wait: -1
          max-idle: 16
          min-idle: 8
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    connection-timeout: 5s
    socket-timeout: 60s

search:
  enabled: true
  sync-on-startup: false
cache:
  local:
    max-size: 2000      # 本地缓存最大容量，默认 2000
    null-ttl: 15        # 空值本地缓存过期时间（秒），默认 15
  redis:
    null-ttl: 30        # 空值 Redis 缓存过期时间（秒），默认 30
xxl:
  job:
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://localhost:8080/xxl-job-admin}
    accessToken: ${XXL_JOB_ACCESS_TOKEN:}
    executor:
      appname: ${spring.application.name}-executor
      ip: ${XXL_JOB_EXECUTOR_IP:}
      port: ${XXL_JOB_EXECUTOR_PORT:9999}
      logpath: ${XXL_JOB_LOG_PATH:./data/applogs/xxl-job/jobhandler}
      logretentiondays: ${XXL_JOB_LOG_RETENTION_DAYS:30}
      enabled: true
