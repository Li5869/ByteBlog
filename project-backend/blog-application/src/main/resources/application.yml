spring:
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: manual
  config:
    import:
      - classpath:application-ai.yml
      - optional:nacos:${spring.application.name}.yaml?refreshEnabled=true
  threads:
    virtual:
      enabled: true
  application:
    name: person-blog
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER:}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        heart-beat-interval: ${NACOS_HEART_BEAT_INTERVAL:5}
        heart-beat-timeout: ${NACOS_HEART_BEAT_TIMEOUT:15}
        ip-delete-timeout: ${NACOS_IP_DELETE_TIMEOUT:30}
      config:
        enabled: true
        server-addr: ${NACOS_SERVER:}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        file-extension: yaml
        refresh-enabled: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/api}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /doc.html

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: "true"
      logic-not-delete-value: "false"
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:1800000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
aliyun:
  oss:
    # 引用系统变量中的 AccessKeyId，若不存在则用空字符串（避免启动报错）
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    # 引用系统变量中的 AccessKeySecret
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    # OSS 地域节点（如杭州：oss-cn-hangzhou.aliyuncs.com）
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    # OSS 桶名称
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:}
# ==================== Actuator 监控配置 ====================
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        # 只暴露必要端点，生产环境不要暴露全部
        include: health,info,prometheus,metrics,threaddump
  endpoint:
    health:
      show-details: when-authorized
      # 显示各组件健康状态：DB、Redis、RabbitMQ、ES
      show-components: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      # 全局标签，方便 Prometheus 区分应用
      application: ${spring.application.name}
    distribution:
      # HTTP 请求耗时直方图（用于计算分位数）
      percentiles-histogram:
        http.server.requests: true
      # 预定义 SLA 桶边界（毫秒）
      sla:
        http.server.requests: 50,100,200,500,1000,2000
  health:
    redis:
      enabled: true
    rabbit:
      enabled: true
    db:
      enabled: true

logging:
  level:
    root: info
    com.lishuaihao.personblog: info
    com.alibaba.nacos.client.config.impl: warn
