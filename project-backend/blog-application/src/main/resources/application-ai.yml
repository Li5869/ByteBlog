spring:
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}

# AI 模块配置
ai:
  python-service:
    url: ${PYTHON_SERVICE_URL}

# API Key 认证配置（用于内部服务间通信）
api-key:
  header-name: ${API_KEY_HEADER_NAME:X-API-Key}
  universal-key: ${API_UNIVERSAL_KEY}
