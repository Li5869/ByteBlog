<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f3460" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#533483" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="pen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="400" height="260" fill="url(#bg)"/>
  <!-- 装饰圆形光晕 -->
  <circle cx="320" cy="60" r="80" fill="url(#glow1)"/>
  <circle cx="80" cy="200" r="70" fill="url(#glow2)"/>
  <!-- 网格装饰 -->
  <line x1="0" y1="40" x2="400" y2="40" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="80" x2="400" y2="80" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="80" y1="0" x2="80" y2="260" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="260" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="260" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="260" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- 中心图标 - 文章/写作图标 -->
  <g transform="translate(163, 80)" filter="url(#glow)">
    <!-- 文档外框 -->
    <rect x="0" y="0" width="74" height="90" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- 折角 -->
    <path d="M52 0 L74 22 L52 22 Z" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <!-- 文字行 -->
    <rect x="12" y="32" width="34" height="4" rx="2" fill="url(#pen)"/>
    <rect x="12" y="44" width="50" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>
    <rect x="12" y="53" width="44" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
    <rect x="12" y="62" width="48" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
    <rect x="12" y="71" width="36" height="3" rx="1.5" fill="rgba(255,255,255,0.2)"/>
    <!-- 笔图标 -->
    <g transform="translate(44, 76)">
      <path d="M16 2L2 16L0 22L6 20Z" fill="url(#pen)" stroke="none"/>
      <path d="M16 2L20 6L6 20L2 16Z" fill="rgba(233,69,96,0.7)" stroke="none"/>
      <line x1="14" y1="4" x2="18" y2="8" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
    </g>
  </g>
  <!-- 底部标签 -->
  <rect x="150" y="186" width="100" height="24" rx="12" fill="rgba(233,69,96,0.2)" stroke="rgba(233,69,96,0.4)" stroke-width="1"/>
  <text x="200" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" letter-spacing="1">暂无封面</text>
  <!-- 装饰点 -->
  <circle cx="30" cy="30" r="3" fill="rgba(233,69,96,0.5)"/>
  <circle cx="44" cy="30" r="3" fill="rgba(245,166,35,0.5)"/>
  <circle cx="58" cy="30" r="3" fill="rgba(80,200,120,0.5)"/>
</svg>
