<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e8e8ff" stop-opacity="0.85"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- 内圈装饰 -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- 头部 -->
  <circle cx="50" cy="36" r="16" fill="url(#fg)"/>
  <!-- 身体 -->
  <path d="M18 85 C18 64 30 56 50 56 C70 56 82 64 82 85" fill="url(#fg)" clip-path="url(#circle)"/>
</svg>
